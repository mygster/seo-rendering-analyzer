<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e293b;
    }
    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: #f8fafc;
    }
    header p {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
    }

    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-analyze {
      background: #6366f1;
      color: #fff;
    }
    #btn-clear {
      background: #1e293b;
      color: #94a3b8;
      flex: 0 0 auto;
      padding: 8px 14px;
    }

    /* Resultater */
    #results {
      padding: 0 16px 14px;
      display: none;
    }

    .page-type {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .page-type.csr  { background: rgba(249,115,22,0.15); color: #fb923c; }
    .page-type.ssr  { background: rgba(34,197,94,0.15);  color: #4ade80; }

    .bar-wrap {
      background: #1e293b;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bar-ssr {
      height: 100%;
      background: #22c55e;
      float: left;
      transition: width 0.4s ease;
    }
    .bar-csr {
      height: 100%;
      background: #f97316;
      float: left;
      transition: width 0.4s ease;
    }

    .legend {
      display: flex;
      gap: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #94a3b8;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ssr { background: #22c55e; }
    .dot.csr { background: #f97316; }
    .legend-item strong { color: #e2e8f0; }

    /* Status */
    #status {
      padding: 0 16px 12px;
      font-size: 11px;
      color: #64748b;
      min-height: 18px;
    }
    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>SEO Rendering Analyzer</h1>
    <p>CSR vs SSR/SSG element-analyse</p>
  </header>

  <div class="btn-row">
    <button id="btn-analyze">Analyser side</button>
    <button id="btn-clear">Ryd</button>
  </div>

  <div id="status"></div>

  <div id="results">
    <div id="page-type-badge" class="page-type"></div>

    <div class="bar-wrap">
      <div class="bar-ssr" id="bar-ssr" style="width:0%"></div>
      <div class="bar-csr" id="bar-csr" style="width:0%"></div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <span class="dot ssr"></span>
        SSR/SSG: <strong id="ssr-count">0</strong>
      </div>
      <div class="legend-item">
        <span class="dot csr"></span>
        CSR: <strong id="csr-count">0</strong>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
